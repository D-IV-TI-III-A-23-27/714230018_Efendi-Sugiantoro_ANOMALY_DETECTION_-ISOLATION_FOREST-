<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#0f172a" rx="20"/>
  
  <!-- Stylized Haystack of Data -->
  <g transform="translate(150, 100)">
    <!-- Normal Points (The Background) -->
    <g opacity="0.3">
      <circle cx="50" cy="50" r="3" fill="#475569"/>
      <circle cx="80" cy="40" r="3" fill="#475569"/>
      <circle cx="60" cy="90" r="3" fill="#475569"/>
      <circle cx="120" cy="60" r="3" fill="#475569"/>
      <circle cx="150" cy="120" r="3" fill="#475569"/>
      <circle cx="40" cy="150" r="3" fill="#475569"/>
      <circle cx="200" cy="80" r="3" fill="#475569"/>
      <circle cx="180" cy="180" r="3" fill="#475569"/>
      <circle cx="250" cy="150" r="3" fill="#475569"/>
      <circle cx="100" cy="200" r="3" fill="#475569"/>
    </g>

    <!-- The Isolated Anomaly (The Needle) -->
    <g transform="translate(400, 100)">
      <!-- Beam of Light -->
      <path d="M-50 -100 L50 -100 L150 300 L-150 300 Z" fill="url(#beamGrad)" opacity="0.4"/>
      
      <!-- The Anomaly Core -->
      <circle cx="0" cy="100" r="15" fill="#ef4444">
        <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#ef4444;#fca5a5;#ef4444" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="0" cy="100" r="30" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5">
        <animate attributeName="r" values="30;50" dur="1.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.5;0" dur="1.5s" repeatCount="indefinite" />
      </circle>
      
      <text x="0" y="160" font-family="Arial" font-weight="bold" font-size="16" fill="#ef4444" text-anchor="middle">THE DISCOVERED ANOMALY</text>
    </g>
  </g>

  <defs>
    <linearGradient id="beamGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <text x="400" y="60" font-family="Arial" font-weight="bold" font-size="24" fill="#e2e8f0" text-anchor="middle">CONCLUSION: TRUTH IN DATA</text>
  <text x="400" y="90" font-family="Arial" font-size="14" fill="#94a3b8" text-anchor="middle">Isolating the unique to understand the whole</text>
</svg>
