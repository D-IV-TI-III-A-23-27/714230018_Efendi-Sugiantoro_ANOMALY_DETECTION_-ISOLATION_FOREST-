<svg id="ai-architecture-svg" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto">
    <!-- Background / Container -->
    <rect width="1000" height="600" rx="20" fill="rgba(15, 23, 42, 0.5)" stroke="rgba(255, 255, 255, 0.05)" />
    
    <!-- Title -->
    <text x="500" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="#f8fafc" letter-spacing="2">ISOLATION FOREST ANOMALY DETECTION ARCHITECTURE</text>

    <!-- OFFLINE MODEL TRAINING BOX -->
    <rect x="20" y="70" width="780" height="240" rx="15" fill="rgba(30, 41, 59, 0.3)" stroke="rgba(255, 255, 255, 0.1)" stroke-dasharray="5,5" />
    <text x="40" y="95" font-family="Inter" font-size="14" font-weight="bold" fill="#94a3b8">OFFLINE MODEL TRAINING</text>

    <!-- DATA SOURCE -->
    <g class="node interactive" onclick="showArchDetail('dataset')">
        <rect x="50" y="150" width="80" height="100" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
        <text x="90" y="195" font-family="FontAwesome" font-size="30" text-anchor="middle" fill="#38bdf8">&#xf1c0;</text>
        <text x="90" y="225" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">RAW DATASET</text>
    </g>

    <!-- FLOW 1 -->
    <path class="flow-line-svg" d="M 130 200 L 170 200" stroke="#38bdf8" stroke-width="2" fill="none" />

    <!-- FEATURE ENGINEERING -->
    <g class="node interactive" onclick="showArchDetail('engineering')">
        <rect x="170" y="160" width="120" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" />
        <text x="230" y="195" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">FEATURE</text>
        <text x="230" y="210" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">ENGINEERING</text>
    </g>

    <!-- FLOW 2 -->
    <path class="flow-line-svg" d="M 290 200 L 330 200" stroke="#6366f1" stroke-width="2" fill="none" />

    <!-- ENGINE BOX -->
    <rect x="330" y="110" width="300" height="180" rx="15" fill="rgba(15, 23, 42, 0.8)" stroke="#38bdf8" stroke-width="2" />
    <text x="480" y="135" font-family="Inter" font-size="12" font-weight="bold" text-anchor="middle" fill="#f8fafc">ISOLATION FOREST ENGINE</text>
    
    <!-- ENSEMBLE OF iTREES -->
    <rect x="350" y="150" width="260" height="120" rx="10" fill="rgba(16, 185, 129, 0.05)" stroke="#10b981" stroke-width="1" />
    <text x="480" y="165" font-family="Inter" font-size="9" text-anchor="middle" fill="#10b981">ENSEMBLE OF iTREES</text>
    
    <!-- MINI TREES -->
    <g transform="translate(370, 180)">
        <circle cx="20" cy="10" r="3" fill="#10b981" />
        <line x1="20" y1="10" x2="10" y2="25" stroke="#10b981" stroke-width="1" />
        <line x1="20" y1="10" x2="30" y2="25" stroke="#10b981" stroke-width="1" />
        <circle cx="10" cy="25" r="3" fill="#10b981" />
        <circle cx="30" cy="25" r="3" fill="#10b981" />
    </g>
    <g transform="translate(450, 180)">
        <circle cx="20" cy="10" r="3" fill="#10b981" />
        <line x1="20" y1="10" x2="10" y2="25" stroke="#10b981" stroke-width="1" />
        <line x1="20" y1="10" x2="30" y2="25" stroke="#10b981" stroke-width="1" />
        <circle cx="10" cy="25" r="3" fill="#10b981" />
        <circle cx="30" cy="25" r="3" fill="#10b981" />
    </g>
    <text x="500" y="240" font-family="Inter" font-size="8" fill="#94a3b8">PATH LENGTH CALCULATION</text>
    <circle cx="560" cy="235" r="15" fill="none" stroke="#f8fafc" stroke-width="1" opacity="0.5" class="animate-magnify" />

    <!-- FLOW 3 -->
    <path class="flow-line-svg" d="M 630 200 L 680 200" stroke="#f8fafc" stroke-width="2" fill="none" />

    <!-- ARTIFACT -->
    <g class="node interactive" onclick="showArchDetail('artifact')">
        <rect x="680" y="160" width="80" height="80" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
        <text x="720" y="195" font-family="FontAwesome" font-size="30" text-anchor="middle" fill="#38bdf8">&#xf1b3;</text>
        <text x="720" y="255" font-family="Inter" font-size="9" text-anchor="middle" fill="#94a3b8">TRAINED MODEL</text>
    </g>

    <!-- REGISTRY -->
    <g class="node interactive" onclick="showArchDetail('registry')">
        <path d="M 850 150 Q 880 120 910 150 T 970 150 Q 970 210 850 210 Z" fill="#1e293b" stroke="#f8fafc" stroke-width="2" />
        <text x="910" y="175" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">MODEL</text>
        <text x="910" y="190" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">REGISTRY</text>
    </g>

    <!-- FLOW 4 -->
    <path d="M 760 200 L 850 180" stroke="#f8fafc" stroke-width="1" fill="none" stroke-dasharray="4,4" />

    <!-- ONLINE INFERENCE BOX -->
    <rect x="20" y="330" width="960" height="250" rx="15" fill="rgba(30, 41, 59, 0.3)" stroke="rgba(255, 255, 255, 0.1)" stroke-dasharray="5,5" />
    <text x="40" y="355" font-family="Inter" font-size="14" font-weight="bold" fill="#94a3b8">ONLINE INFERENCE</text>

    <!-- LIVE DATA -->
    <g class="node interactive" onclick="showArchDetail('live')">
        <rect x="40" y="450" width="160" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" />
        <text x="120" y="485" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">LIVE DATA STREAM</text>
        <text x="120" y="500" font-family="Inter" font-size="8" text-anchor="middle" fill="#94a3b8">(Real-time network logs)</text>
    </g>

    <!-- FLOW 5 -->
    <path class="flow-line-svg" d="M 200 490 L 240 490" stroke="#10b981" stroke-width="2" fill="none" />

    <!-- ALERT & MITIGATION -->
    <g class="node interactive" onclick="showArchDetail('alert')">
        <rect x="240" y="450" width="110" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2" />
        <text x="295" y="485" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">ALERT &</text>
        <text x="295" y="500" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">MITIGATION</text>
    </g>

    <!-- DECISION GATEWAY -->
    <path d="M 350 490 L 480 490" stroke="#f8fafc" stroke-width="1" fill="none" />
    <text x="415" y="480" font-family="Inter" font-size="8" text-anchor="middle" fill="#94a3b8">DECISION GATEWAY</text>

    <!-- PREPROCESSING -->
    <g class="node interactive" onclick="showArchDetail('preprocess')">
        <rect x="480" y="450" width="130" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" />
        <text x="545" y="485" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">REAL-TIME</text>
        <text x="545" y="500" font-family="Inter" font-size="10" text-anchor="middle" fill="#f8fafc" font-weight="bold">PREPROCESSING</text>
    </g>

    <!-- FLOW 6 -->
    <path class="flow-line-svg" d="M 610 490 L 660 490" stroke="#6366f1" stroke-width="2" fill="none" />

    <!-- INFERENCE SERVICE -->
    <g class="node interactive" onclick="showArchDetail('inference')">
        <rect x="660" y="430" width="220" height="120" rx="15" fill="#1e293b" stroke="#38bdf8" stroke-width="3" />
        <text x="770" y="480" font-family="FontAwesome" font-size="40" text-anchor="middle" fill="#38bdf8">&#xf1bb;</text>
        <text x="770" y="520" font-family="Inter" font-size="12" text-anchor="middle" fill="#f8fafc" font-weight="black">INFERENCE SERVICE</text>
    </g>

    <!-- ANOMALY SCORE BOX -->
    <g class="node interactive" onclick="showArchDetail('score')">
        <rect x="600" y="380" width="200" height="40" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="1" />
        <text x="700" y="405" font-family="Inter" font-size="10" text-anchor="middle" fill="#10b981" font-weight="bold">ANOMALY SCORE (s(x,n))</text>
    </g>
    <path d="M 700 420 L 700 430" stroke="#10b981" stroke-width="1" fill="none" />

    <!-- CONNECT REGISTRY TO INFERENCE -->
    <path d="M 910 210 L 910 490 L 880 490" stroke="#f8fafc" stroke-width="1" fill="none" stroke-dasharray="5,5" />
    <text x="915" y="350" font-family="Inter" font-size="8" fill="#94a3b8" transform="rotate(90, 915, 350)">TRAINED MODEL</text>

    <!-- FEEDBACK LOOP -->
    <path d="M 295 450 L 295 380 L 230 380 L 230 240" stroke="#f8fafc" stroke-width="1" fill="none" stroke-dasharray="5,5" />
    <text x="350" y="375" font-family="Inter" font-size="10" fill="#f8fafc">FEEDBACK LOOP</text>

    <style>
        .node { transition: all 0.3s; cursor: pointer; }
        .node:hover { filter: brightness(1.3); }
        .interactive { pointer-events: all; }
        
        .flow-line-svg {
            stroke-dasharray: 10, 10;
            animation: dash-flow 2s linear infinite;
        }
        
        @keyframes dash-flow {
            to { stroke-dashoffset: -20; }
        }
        
        .animate-magnify {
            animation: magnify-move 4s ease-in-out infinite;
        }
        
        @keyframes magnify-move {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, 10px); }
        }
    </style>
</svg>
