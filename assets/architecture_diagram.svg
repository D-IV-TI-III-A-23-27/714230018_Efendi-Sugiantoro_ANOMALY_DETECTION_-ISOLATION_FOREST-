<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blocks -->
  <rect x="20" y="160" width="100" height="80" rx="12" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2" />
  <text x="70" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#475569">Raw Data</text>
  
  <path d="M120 200 L160 200" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  
  <rect x="160" y="160" width="120" height="80" rx="12" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2" />
  <text x="220" y="195" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#4338CA">Sub-sampling</text>
  <text x="220" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#6366F1">(n=256)</text>
  
  <path d="M280 200 L320 200" stroke="#94A3B8" stroke-width="2" />
  
  <!-- Forest Area -->
  <rect x="320" y="50" width="160" height="300" rx="20" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="4 4" />
  <text x="400" y="40" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#64748B">Isolation Forest (iTrees)</text>
  
  <rect x="340" y="80" width="120" height="40" rx="8" fill="white" stroke="#CBD5E1" />
  <text x="400" y="105" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">iTree #1</text>
  
  <rect x="340" y="140" width="120" height="40" rx="8" fill="white" stroke="#CBD5E1" />
  <text x="400" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">iTree #2</text>
  
  <text x="400" y="220" text-anchor="middle" font-family="Arial" font-size="20" fill="#CBD5E1">...</text>
  
  <rect x="340" y="260" width="120" height="40" rx="8" fill="white" stroke="#CBD5E1" />
  <text x="400" y="285" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">iTree #n</text>
  
  <path d="M480 200 L520 200" stroke="#94A3B8" stroke-width="2" />
  
  <rect x="520" y="160" width="120" height="80" rx="12" fill="#D1FAE5" stroke="#10B981" stroke-width="2" />
  <text x="580" y="195" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#065F46">Path Length</text>
  <text x="580" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#059669">Averaging E(h(x))</text>
  
  <path d="M640 200 L680 200" stroke="#94A3B8" stroke-width="2" />
  
  <rect x="680" y="160" width="100" height="80" rx="12" fill="#FFE4E6" stroke="#F43F5E" stroke-width="2" />
  <text x="730" y="195" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9F1239">Anomaly Score</text>
  <text x="730" y="215" text-anchor="middle" font-family="Arial" font-size="9" fill="#E11D48">Decision s(x, n)</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94A3B8" />
    </marker>
  </defs>
</svg>
