<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ai-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="brainGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="#0f172a" rx="20"/>

  <!-- Digital Brain Nodes & Connections -->
  <g transform="translate(400, 250)" filter="url(#ai-glow)">
    <!-- Neural Network Connections -->
    <g stroke="#38bdf8" stroke-width="1" opacity="0.4">
      <path d="M-100 -80 L0 -150 L100 -80 L120 50 L0 150 L-120 50 Z" fill="none" />
      <path d="M-100 -80 L120 50 M100 -80 L-120 50 M0 -150 L0 150" />
      <path d="M-150 0 L150 0 M-80 -120 L80 120 M80 -120 L-80 120" />
    </g>

    <!-- Brain Hemispheres (Stylized Nodes) -->
    <g fill="#0ea5e9">
      <circle cx="-100" cy="-80" r="6">
        <animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="100" cy="-80" r="6" />
      <circle cx="120" cy="50" r="6" />
      <circle cx="-120" cy="50" r="6" />
      <circle cx="0" cy="150" r="8" fill="#38bdf8" />
      <circle cx="0" cy="-150" r="8" fill="#38bdf8" />
      <circle cx="0" cy="0" r="20" fill="#38bdf8" fill-opacity="0.3" stroke="#38bdf8" stroke-width="2">
        <animate attributeName="fill-opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Floating Data Bits -->
    <circle cx="180" cy="-120" r="3" fill="#34d399">
      <animateTransform attributeName="transform" type="translate" values="0 0; 20 -20; 0 0" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="-200" cy="100" r="3" fill="#fbbf24">
      <animateTransform attributeName="transform" type="translate" values="0 0; -30 30; 0 0" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <text x="400" y="60" font-family="Arial" font-weight="bold" font-size="28" fill="#e2e8f0" text-anchor="middle">ARTIFICIAL INTELLIGENCE CORE</text>
  <text x="400" y="90" font-family="Arial" font-size="14" fill="#64748b" text-anchor="middle">Mimicking Human Cognition through Digital Synthesis</text>
</svg>
