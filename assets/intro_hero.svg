<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" rx="20" fill="#F8FAFC" />
  <!-- Normal Points -->
  <circle cx="220" cy="150" r="40" fill="#4F46E5" fill-opacity="0.1" stroke="#4F46E5" stroke-width="1" stroke-dasharray="4 4" />
  <circle cx="210" cy="140" r="4" fill="#6366F1" />
  <circle cx="230" cy="145" r="4" fill="#6366F1" />
  <circle cx="215" cy="160" r="4" fill="#6366F1" />
  <circle cx="225" cy="155" r="4" fill="#6366F1" />
  <circle cx="205" cy="152" r="4" fill="#6366F1" />
  <circle cx="235" cy="138" r="4" fill="#6366F1" />
  
  <!-- Anomaly Point -->
  <g filter="url(#glow)">
    <circle cx="80" cy="80" r="8" fill="#F43F5E" />
    <circle cx="80" cy="80" r="15" stroke="#F43F5E" stroke-width="2" stroke-opacity="0.3">
      <animate attributeName="r" values="8;20;8" dur="2s" repeatCount="indefinite" />
      <animate attributeName="stroke-opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Labels -->
  <text x="220" y="210" text-anchor="middle" font-family="Arial" font-size="12" fill="#4F46E5" font-weight="bold">Data Normal (Klaster)</text>
  <text x="80" y="120" text-anchor="middle" font-family="Arial" font-size="12" fill="#F43F5E" font-weight="bold">Anomali (Terisolasi)</text>
  
  <!-- Connecting Lines (Partition Idea) -->
  <line x1="140" y1="20" x2="140" y2="280" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4" />
</svg>
