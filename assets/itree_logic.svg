<svg width="500" height="350" viewBox="0 0 500 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Root Node -->
  <rect x="225" y="20" width="50" height="30" rx="8" fill="#1E293B" />
  <text x="250" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">Root</text>
  
  <!-- Level 1 -->
  <path d="M225 40 L120 100" stroke="#CBD5E1" stroke-width="2" />
  <path d="M275 40 L380 100" stroke="#CBD5E1" stroke-width="2" />
  
  <!-- Anomaly Node (Short Path) -->
  <circle cx="120" cy="100" r="15" fill="#F43F5E" />
  <text x="120" y="130" text-anchor="middle" fill="#F43F5E" font-family="Arial" font-size="10" font-weight="bold">Anomali (Short)</text>
  
  <!-- Normal Nodes (Long Path) -->
  <circle cx="380" cy="100" r="15" fill="#4F46E5" />
  <path d="M380 115 L330 180" stroke="#CBD5E1" stroke-width="2" />
  <path d="M380 115 L430 180" stroke="#CBD5E1" stroke-width="2" />
  
  <circle cx="330" cy="180" r="12" fill="#6366F1" />
  <circle cx="430" cy="180" r="12" fill="#6366F1" />
  
  <path d="M430 192 L410 250" stroke="#CBD5E1" stroke-width="2" />
  <path d="M430 192 L450 250" stroke="#CBD5E1" stroke-width="2" />
  
  <circle cx="410" cy="250" r="10" fill="#818CF8" />
  <circle cx="450" cy="250" r="10" fill="#818CF8" />
  
  <text x="430" y="280" text-anchor="middle" fill="#4F46E5" font-family="Arial" font-size="10" font-weight="bold">Normal (Deep Path)</text>
  
  <!-- Legend -->
  <rect x="20" y="280" width="120" height="50" rx="10" fill="white" stroke="#E2E8F0" />
  <circle cx="40" cy="295" r="5" fill="#F43F5E" />
  <text x="55" y="300" font-family="Arial" font-size="10" fill="#64748B">Anomaly h(x) ≈ 1</text>
  <circle cx="40" cy="315" r="5" fill="#4F46E5" />
  <text x="55" y="320" font-family="Arial" font-size="10" fill="#64748B">Normal h(x) > 10</text>
</svg>
