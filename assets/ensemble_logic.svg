<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="#0f172a" rx="20"/>

  <!-- Ensemble of iTrees -->
  <g transform="translate(100, 150)">
    <!-- Tree 1 -->
    <g class="tree-unit">
      <path d="M0 80 L30 20 L60 80 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="30" cy="20" r="5" fill="#38bdf8"/>
      <text x="30" y="100" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">iTree_01</text>
      <text x="30" y="60" font-family="Arial" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle">h=2</text>
    </g>

    <!-- Tree 2 -->
    <g transform="translate(120, 0)">
      <path d="M0 80 L30 20 L60 80 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="30" cy="20" r="5" fill="#38bdf8"/>
      <text x="30" y="100" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">iTree_02</text>
      <text x="30" y="60" font-family="Arial" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle">h=3</text>
    </g>

    <!-- Tree 3 -->
    <g transform="translate(240, 0)">
      <path d="M0 80 L30 20 L60 80 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
      <circle cx="30" cy="20" r="5" fill="#38bdf8"/>
      <text x="30" y="100" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">iTree_03</text>
      <text x="30" y="60" font-family="Arial" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle">h=2</text>
    </g>

    <!-- Summation Symbol -->
    <g transform="translate(350, 40)">
      <text x="0" y="0" font-family="serif" font-size="60" fill="#e2e8f0" font-weight="bold">Σ</text>
      <text x="5" y="30" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">/ n</text>
    </g>

    <!-- Arrow -->
    <path d="M420 40 L480 40" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

    <!-- Final Result -->
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="120" height="80" rx="15" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="3" filter="url(#glow-blue)"/>
      <text x="60" y="35" font-family="Arial" font-weight="bold" font-size="14" fill="#fecaca" text-anchor="middle">ANOMALY</text>
      <text x="60" y="55" font-family="Arial" font-weight="bold" font-size="18" fill="#ef4444" text-anchor="middle">SCORE: 0.92</text>
    </g>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="50" font-family="Arial" font-weight="bold" font-size="22" fill="#e2e8f0" text-anchor="middle">ISOLATION FOREST ENSEMBLE</text>
  <text x="400" y="80" font-family="Arial" font-size="14" fill="#64748b" text-anchor="middle">Combining multiple iTrees for robust decision making</text>
</svg>
